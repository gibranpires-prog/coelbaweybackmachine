name: Wayback Machine Auto Save

on:
  schedule:
    # O GitHub Actions usa o horario UTC. 
    # 08:00 BRT (Brasilia) = 11:00 UTC
    # 18:00 BRT (Brasilia) = 21:00 UTC
    - cron: '0 11,21 * * *'
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Executar Script
        run: python WaybackMachine-Coelba.py
